name: Validate Skipped Tests

on:
  push:
    paths:
      - "skipped-tests/**"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skipped-tests/tools
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Validate skipped.yaml
        run: npm run validate

      - name: Dump skipped.yaml on failure
        if: failure()
        run: cat skipped-tests/skipped.yaml

      - name: Generate final skip list
        run: |
          set -euo pipefail

          output=$(npm run --silent generate)
          echo "Generated output: $output"

          # ------------------------
          # empty output = skip validation
          # ------------------------
          if [ -z "$output" ]; then
            echo "Empty output, skipping format validation."
            exit 0
          fi

          # ------------------------
          # format: key:value;key:value
          # ------------------------
          printf '%s' "$output" | grep -qE '^([^:;]+:[^:;]+(;[^:;]+:[^:;]+)*)$' \
            || {
              echo "::error title=Invalid format::generate.js output format is invalid"
              exit 1
            }

          echo "generate.js output format is valid."
