name: Validate Skipped Tests

on:
  pull_request:
    paths:
      - "skipped-tests/**"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: skipped-tests/tools

      - name: Validate skipped.yaml
        run: node validate.js
        working-directory: skipped-tests/tools

      - name: Dump skipped.yaml on failure
        if: failure()
        run: cat skipped-tests/skipped.yaml

      - name: Validate generate.js output
        working-directory: skipped-tests/tools
        run: |
          output=$(node generate.js)
          echo "Generated output: $output"
          # format: key:value;key:value
          printf '%s' "$output" | grep -qE '^([^:;]+:[^;]+(;[^:;]+:[^:;]+)*)?$' \
            || { echo "ERROR: invalid format"; exit 1; }
          echo "generate.js output format is valid."
